<!DOCTYPE html>
<html lang="fr" dir="ltr" style="background:#030407">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Espace membre Flaynn — score, piliers et benchmark marché.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#030407">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flaynn">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <title>Flaynn · Dashboard membre</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/defaut.css" as="style">
    <link rel="preload" href="/dashboard/dashboard.css" as="style">
    <link rel="modulepreload" href="/dashboard/app.js">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/defaut.css">
    <link rel="stylesheet" href="/dashboard/dashboard.css">
</head>
<body class="dashboard-body">
    <a href="#app" class="skip-link">Aller au tableau de bord</a>
    <div class="ambient-bg" aria-hidden="true"></div>

    <header class="nav-glass dashboard-topbar">
        <div class="container nav-content">
            <a href="/" class="logo-container" aria-label="Flaynn — Accueil site">
                <img src="/icons/logo.png" alt="" width="82" height="98" class="logo-img" aria-hidden="true">
            </a>
            <p class="dashboard-topbar__title" id="dashboard-startup-name">Chargement…</p>
        </div>
    </header>

    <div class="dashboard-shell">
        <aside class="dashboard-sidebar" aria-label="Navigation espace membre">
            <nav class="dashboard-nav-side">
                <a href="/dashboard/" class="dashboard-nav-side__link dashboard-nav-side__link--violet" data-route="/dashboard/">
                    <svg class="dashboard-nav-side__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
                    </svg>
                    <span class="dashboard-nav-side__label">Vue d’ensemble</span>
                </a>
                <a href="/dashboard/pillars" class="dashboard-nav-side__link dashboard-nav-side__link--orange" data-route="/dashboard/pillars">
                    <svg class="dashboard-nav-side__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
                    </svg>
                    <span class="dashboard-nav-side__label">Piliers</span>
                </a>
                <a href="/dashboard/network" class="dashboard-nav-side__link dashboard-nav-side__link--blue" data-route="/dashboard/network">
                    <svg class="dashboard-nav-side__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 3.75H6A2.25 2.25 0 0 0 3.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0 1 20.25 6v1.5m0 9V18A2.25 2.25 0 0 1 18 20.25h-1.5m-9 0H6A2.25 2.25 0 0 1 3.75 18v-1.5M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    <span class="dashboard-nav-side__label">Marché</span>
                </a>
            </nav>
        </aside>

        <main id="main-content" class="dashboard-main">
            <div
                id="app"
                class="dashboard-app"
                tabindex="-1"
                role="region"
                aria-live="polite"
                aria-busy="true"
                aria-label="Contenu du tableau de bord"
            ></div>
        </main>
    </div>

    <nav class="dashboard-nav-mobile" aria-label="Navigation mobile" role="navigation">
        <a href="/dashboard/" class="dashboard-nav-mobile__item dashboard-nav-mobile__item--violet" data-route="/dashboard/">
            <svg class="dashboard-nav-mobile__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
            <span class="dashboard-nav-mobile__label">Accueil</span>
        </a>
        <a href="/dashboard/pillars" class="dashboard-nav-mobile__item dashboard-nav-mobile__item--orange" data-route="/dashboard/pillars">
            <svg class="dashboard-nav-mobile__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
            </svg>
            <span class="dashboard-nav-mobile__label">Piliers</span>
        </a>
        <a href="/dashboard/network" class="dashboard-nav-mobile__item dashboard-nav-mobile__item--blue" data-route="/dashboard/network">
            <svg class="dashboard-nav-mobile__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 3.75H6A2.25 2.25 0 0 0 3.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0 1 20.25 6v1.5m0 9V18A2.25 2.25 0 0 1 18 20.25h-1.5m-9 0H6A2.25 2.25 0 0 1 3.75 18v-1.5M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            <span class="dashboard-nav-mobile__label">Marché</span>
        </a>
    </nav>

    <div id="page-loader" aria-hidden="true">
        <canvas id="loader-starfield"></canvas>
        <img src="/icons/icon-192.png" alt="" class="loader-icon" width="48" height="48">
    </div>

    <script type="module" src="/register-sw.js"></script>
    <script type="module" src="/dashboard/app.js"></script>
    <script src="/js/page-loader.js" defer></script>
</body>
</html>
