# Render Blueprint — API Fastify + fichiers statiques (public/)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flaynn-saas
    runtime: node
    rootDir: flaynn-api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: N8N_SCORE_WEBHOOK_URL
        sync: false
