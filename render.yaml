# Render Blueprint — API Fastify + fichiers statiques (public/)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flaynn-api
    env: node
    buildCommand: cd flaynn-api && npm install
    startCommand: cd flaynn-api && npm start
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
