# Render Blueprint — API Fastify + fichiers statiques (public/)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flaynn-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: cd flaynn-api && npm ci --omit=dev
    startCommand: cd flaynn-api && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # ARCHITECT-PRIME: secrets geres via le dashboard Render (sync: false)
      - key: DATABASE_URL
        fromDatabase:
          name: flaynn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        value: https://flaynn.io
      # Les origines canoniques (flaynn.io, flaynn.tech, flaynn.com, flaynn.fr) sont
      # hardcodées dans src/config/security.js (CANONICAL_PROD_ORIGINS) et garanties
      # quel que soit l'état de l'env (anti-typo post-incident avril 2026).
      # CORS_ORIGIN sert uniquement à AJOUTER des origines non-canoniques :
      # URL Render interne (monitoring, health checks), previews staging, etc.
      - key: CORS_ORIGIN
        value: https://flaynn-saas.onrender.com
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_SECRET_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      # Delta 12: secrets BA onboarding (set via Render dashboard)
      - key: STRIPE_PRICE_BA_SUBSCRIPTION
        sync: false
      - key: INTRO_TOKEN_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: BA_PUBLIC_BASE_URL
        value: https://flaynn.com
      # Delta 13: stockage R2 Cloudflare (set via Render dashboard)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false

databases:
  - name: flaynn-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: "16"
